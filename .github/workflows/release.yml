name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        run: go build -o fix-mic .

      - name: Package
        run: tar czf fix-mic-linux-amd64.tar.gz fix-mic

      - name: Generate release notes
        run: |
          echo "## fix-mic ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details." >> release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: fix-mic-linux-amd64.tar.gz
