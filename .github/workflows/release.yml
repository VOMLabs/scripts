name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build scripty
        run: go build -o scripty ./cmd/scripty/

      - name: Build fix-mic
        run: go build -o fix-mic ./cmd/fix-mic/

      - name: Package binaries
        run: |
          tar czf scripty-linux-amd64.tar.gz scripty
          tar czf fix-mic-linux-amd64.tar.gz fix-mic

      - name: Generate release notes
        run: |
          echo "## scripty ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details." >> release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            scripty-linux-amd64.tar.gz
            fix-mic-linux-amd64.tar.gz
