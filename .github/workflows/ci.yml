name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build scripty
        run: go build -o scripty ./cmd/scripty/

      - name: Build fix-mic
        run: go build -o fix-mic ./cmd/fix-mic/

      - name: Verify builds
        run: |
          ./scripty --help 2>&1 || true
          file scripty fix-mic

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            scripty
            fix-mic
